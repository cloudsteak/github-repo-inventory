name: Inventory Sync

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: inventory-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GITHUB_TOKEN: ${{ secrets.INVENTORY_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Create config
        run: |
          cat > config.yaml <<'EOF'
          github:
            token_env: GITHUB_TOKEN
            user: ${{ github.repository_owner }}
            organizations:
              - ${{ github.repository_owner }}
            include_forks: true
            include_archived: true
          storage:
            database: data/inventory.db
            json_export: data/inventory.json
            runs_dir: data/runs
            auto_publish_dashboard: false
          sync:
            concurrency: 2
          EOF

      - name: Sync inventory
        # Requires INVENTORY_GITHUB_TOKEN secret (fine-grained PAT) for org-wide discovery.
        run: uv run github-repo-inventory sync

      - name: Export CSV artifact
        run: uv run github-repo-inventory export --csv data/inventory.csv

      - name: Upload inventory artifacts
        uses: actions/upload-artifact@v7
        with:
          name: inventory-${{ github.run_id }}
          path: |
            data/inventory.json
            data/inventory.csv
            data/runs/

  pages-check:
    runs-on: ubuntu-latest
    permissions:
      pages: read
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - name: Check GitHub Pages is enabled
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh api "repos/${{ github.repository }}/pages" >/dev/null 2>&1; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice title=GitHub Pages not enabled::Enable Settings → Pages → Build and deployment → Source: GitHub Actions, then re-run."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

  deploy-dashboard:
    needs: [sync, pages-check]
    if: needs.pages-check.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download latest inventory
        uses: actions/download-artifact@v4
        with:
          pattern: inventory-*
          merge-multiple: true
          path: .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build password-protected dashboard
        working-directory: dashboard
        env:
          # Secret exists only in GitHub Actions — never in git or the built JS bundle.
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
          VITE_ENCRYPTED_INVENTORY: "true"
        run: |
          if [ -z "$DASHBOARD_PASSWORD" ]; then
            echo "::error title=Missing DASHBOARD_PASSWORD secret::Add a repository secret named DASHBOARD_PASSWORD before deploying to GitHub Pages."
            exit 1
          fi
          npm ci
          node scripts/encrypt-inventory.mjs ../data/inventory.json public/inventory.enc.json
          rm -f public/inventory.json public/inventory.csv
          npm run build
          rm -f dist/inventory.json dist/inventory.csv
          if grep -R --binary-files=text -E 'DASHBOARD_PASSWORD|github_pat_' dist/; then
            echo "::error title=Possible secret leak::Built assets contain forbidden patterns."
            exit 1
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dashboard/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
