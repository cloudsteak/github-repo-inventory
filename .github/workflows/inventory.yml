name: Inventory Sync

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: inventory-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GITHUB_TOKEN: ${{ secrets.INVENTORY_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Create config
        run: |
          cat > config.yaml <<'EOF'
          github:
            token_env: GITHUB_TOKEN
            user: ${{ github.repository_owner }}
            organizations:
              - ${{ github.repository_owner }}
            include_forks: true
            include_archived: true
          storage:
            database: data/inventory.db
            json_export: data/inventory.json
            runs_dir: data/runs
            auto_publish_dashboard: false
          sync:
            concurrency: 2
          EOF

      - name: Sync inventory
        # Requires INVENTORY_GITHUB_TOKEN secret (fine-grained PAT) for org-wide discovery.
        run: uv run github-repo-inventory sync

      - name: Export CSV artifact
        run: uv run github-repo-inventory export --csv data/inventory.csv

      - name: Upload inventory artifacts
        uses: actions/upload-artifact@v7
        with:
          name: inventory-${{ github.run_id }}
          path: |
            data/inventory.json
            data/inventory.csv
            data/runs/
